name: Update Toolchains

on:
  # Manually triggerable only.
  workflow_dispatch:

# Permissions needed for GITHUB_TOKEN to create PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  update-toolchains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Update nightly version
        uses: ./.github/actions/update-nightly
      - name: Update stable version
        uses: ./.github/actions/update-stable
