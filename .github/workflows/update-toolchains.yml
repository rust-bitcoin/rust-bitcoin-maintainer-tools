name: Update Toolchains

on:
  # Manually triggerable only.
  workflow_dispatch:

# Permissions needed for GITHUB_TOKEN to create PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  update-toolchains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Update toolchains
        uses: ./.github/actions/update-toolchains
