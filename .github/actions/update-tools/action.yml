name: 'Update Tools'
description: |
  Update tools pinned in [workspace.metadata.rbmt.tools] to their latest versions
  and create a PR if any versions changed.

  Usage example (complete workflow with weekly cron schedule):

  ```yaml
  name: Update Tools

  on:
    schedule:
      - cron: '0 0 * * 6'  # Weekly on Saturday at 00:00 UTC

  permissions:
    contents: write
    pull-requests: write

  jobs:
    update-tools:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Update tools
          uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/update-tools@master
  ```

  To update only specific tools rather than all tools:

  ```yaml
        - name: Update zizmor
          uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/update-tools@master
          with:
            tools: zizmor
  ```

inputs:
  tools:
    description: |
      Space-separated list of tool names to update. Defaults to all tools in
      [workspace.metadata.rbmt.tools] if not provided.
    required: false
    default: ''
  token:
    description: |
      GitHub token for creating pull requests. Defaults to GITHUB_TOKEN if not provided.

      Using the default GITHUB_TOKEN is simple, but less secure because it requires the
      "Allow GitHub Actions to create and approve pull requests" to be enabled on a repository.
      A Personal Access Token (PAT) with `repo` privileges can be set as a repository
      secret instead and passed in explicitly here (e.g. ${{ secrets.RBMT_TOKEN }}).
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install cargo-rbmt
      shell: bash
      run: cargo install --git https://github.com/rust-bitcoin/rust-bitcoin-maintainer-tools.git cargo-rbmt --locked

    - name: Update tools
      shell: bash
      run: cargo rbmt tools --update ${{ inputs.tools }}

    - name: Create pull request if versions changed
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ inputs.token || github.token }}
        author: RBMT Bot <bot@example.com>
        committer: RBMT Bot <bot@example.com>
        title: "Update tools"
        commit-message: "Update tools"
        branch: automated/update-tools
        body: |
          Automated update to `[workspace.metadata.rbmt.tools]` by [update-tools](https://github.com/rust-bitcoin/rust-bitcoin-maintainer-tools) action.
