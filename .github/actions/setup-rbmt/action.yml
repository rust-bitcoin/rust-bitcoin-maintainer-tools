name: 'Setup rbmt'
description: |
  Install environment dependencies for cargo-rbmt testing including cargo-rbmt itself.

  * Nightly is pulled from the nightly-version file, defaults to "nightly".
  * Stable is pulled from the stable-version file, defaults to "stable".
  * MSRV is parsed from the rust-version field in the package manifest(s).

inputs:
  rbmt-version:
    description: 'Git ref (commit, tag, or branch) of cargo-rbmt to install. If not provided, reads from rbmt-version file in repo root, or falls back to master.'
    required: false

runs:
  using: "composite"
  steps:
    - name: Install a Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Install cargo-rbmt
      shell: bash
      run: |
        RBMT_VERSION="${{ inputs.rbmt-version }}"
        [ -z "$RBMT_VERSION" ] && [ -f rbmt-version ] && RBMT_VERSION=$(cat rbmt-version)
        [ -z "$RBMT_VERSION" ] && RBMT_VERSION=master
        cargo install --git https://github.com/rust-bitcoin/rust-bitcoin-maintainer-tools.git --rev "$RBMT_VERSION" cargo-rbmt --locked

    - name: Install toolchains
      shell: bash
      run: cargo rbmt toolchains

    # ARM cross-compiler for C dependencies compiled at build-time (e.g. secp256k1-sys).
    # When a crate's build.rs uses cc-rs to compile C source files for thumbv7m-none-eabi,
    # it needs arm-none-eabi-gcc because system gcc doesn't support ARM target flags.
    # Pure Rust crates only need rustc and rust-lld (already included with Rust).
    - name: Install ARM cross-compiler
      shell: bash
      run: |
        # --no-install-recommends reduces install size by skipping newlib.
        sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
        echo "CC_thumbv7m_none_eabi=arm-none-eabi-gcc" >> $GITHUB_ENV
