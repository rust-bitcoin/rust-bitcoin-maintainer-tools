name: Update Toolchains

on:
  # Manually triggerable only.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-toolchains:
    runs-on: debian-trixie
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: ./actions/setup-rbmt
        with:
          rbmt-version: ${{ forgejo.sha }}
      - name: Configure git
        run: |
          git config user.name "RBMT Bot"
          git config user.email "bot@example.com"
      - name: Update nightly version and commit
        run: |
          cargo rbmt toolchains --update-nightly
          git add . && git commit -m "Update nightly toolchain" || echo "No nightly toolchain updates"
      - name: Update stable version and commit
        run: |
          cargo rbmt toolchains --update-stable
          git add . && git commit -m "Update stable toolchain" || echo "No stable toolchain updates"
      - name: Create pull request using agit
        run: |
          git push origin HEAD:refs/for/master/update-toolchains \
            -o title="Update toolchains" \
            -o description="Automated update to toolchains by update-toolchains workflow." || echo "No toolchain changes to push"
