name: Update Toolchains

on:
  # Manually triggerable only.
  workflow_dispatch:

# Permissions needed for to create PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  update-toolchains:
    runs-on: debian-trixie
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Update nightly version
        uses: ./actions/update-nightly
      - name: Update stable version
        uses: ./actions/update-stable
