name: Update Toolchains

on:
  # Manually triggerable only.
  workflow_dispatch:

permissions:
  contents: write

# Use a custom rustup home on the same filesystem to avoid cross-device link errors
# in container environments with layered filesystems (e.g., Docker/overlayfs).
env:
  RUSTUP_HOME: /home/ci/tmp

jobs:
  update-toolchains:
    runs-on: debian-trixie
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          # Use a token associated with a user account, they open the pull request.
          # The ephemeral workflow token is sometimes user-less.
          token: ${{ secrets.RBMT }}
      - name: Install a default toolchain in tmp
        run: rustup default stable
      - uses: ./actions/setup-rbmt
        with:
          rbmt-path: cargo-rbmt
      - name: Configure git
        run: |
          git config --global user.name "RBMT Bot"
          git config --global user.email "bot@example.com"
      - name: Update nightly version and commit
        run: |
          cargo rbmt toolchains --update-nightly
          if git add . && git commit -m "Update nightly toolchain"; then
            echo "TOOLCHAIN_UPDATE=true" >> $GITHUB_ENV
          fi
      - name: Update stable version and commit
        run: |
          cargo rbmt toolchains --update-stable
          if git add . && git commit -m "Update stable toolchain"; then
            echo "TOOLCHAIN_UPDATE=true" >> $GITHUB_ENV
          fi
      - name: Create pull request using agit
        if: ${{ env.TOOLCHAIN_UPDATE == 'true' }}
        run: |
          git push origin HEAD:refs/for/master/update-toolchains \
            -o title="Update toolchains" \
            -o description="Automated update to toolchains by update-toolchains workflow."
