name: Update Tools

on:
  # Manually triggerable only.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tools:
    runs-on: debian-trixie
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
      - uses: ./actions/setup-rbmt
        with:
          rbmt-version: ${{ forgejo.sha }}
      - name: Configure git
        run: |
          git config user.name "RBMT Bot"
          git config user.email "bot@example.com"
      - name: Update tools and commit
        run: |
          cargo rbmt tools --update
          git add . && git commit -m "Update tools" || echo "No tool updates"
      - name: Create pull request using agit
        run: |
          git push origin HEAD:refs/for/master/update-tools \
            -o title="Update tools" \
            -o description="Automated update to tool versions by update-tools workflow." || echo "No tool changes to push"
