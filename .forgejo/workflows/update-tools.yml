name: Update Tools

on:
  # Manually triggerable only.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-tools:
    runs-on: debian-trixie
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - uses: ./actions/setup-rbmt
      - name: Update tools
        run: cargo rbmt tools --update
      - name: Create pull request if versions changed
        uses: https://github.com/peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ forgejo.token }}
          author: RBMT Bot <bot@example.com>
          committer: RBMT Bot <bot@example.com>
          title: "Update tools"
          commit-message: "Update tools"
          branch: automated/update-tools
          body: |
            Automated update to `[workspace.metadata.rbmt.tools]` by update-tools workflow.
