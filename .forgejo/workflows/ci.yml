name: CI

# Several jobs use `forgejo.event.pull_request.base.sha || forgejo.event.before` as a baseline ref.
# On PRs, `base.sha` is the merge base, which is equivalent to master. On pushes to master,
# `event.before` is the commit just before the push using `master` instead would compare HEAD
# against itself since master now includes the pushed commits, making the check useless.

on:
  push:
    branches: [ master ]
  pull_request:

permissions: {}

jobs:
  dogfood-lints:
    runs-on: debian-trixie
    permissions: {}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - name: Dogfood with cargo-rbmt
        uses: ./actions/setup-rbmt
        with:
          rbmt-path: cargo-rbmt
      - run: cargo rbmt lint --lockfile existing
      - run: cargo rbmt docs --lockfile existing
      - run: cargo rbmt docsrs --lockfile existing
      - run: cargo rbmt fmt --check

  dogfood-prerelease:
    runs-on: debian-trixie
    permissions: {}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          fetch-depth: 0 # Context required for version bump detection.
          persist-credentials: false
      - uses: ./actions/setup-rbmt
        with:
          rbmt-path: cargo-rbmt
      - run: cargo rbmt prerelease --baseline ${{ forgejo.event.pull_request.base.sha || forgejo.event.before }}

  dogfood-api:
    runs-on: debian-trixie
    permissions: {}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          persist-credentials: false
      - uses: ./actions/setup-rbmt
        with:
          rbmt-path: cargo-rbmt
      - name: Setup api-test-cases toolchains and check API
        working-directory: cargo-rbmt/api-test-cases
        run: cargo rbmt toolchains && cargo rbmt api --lockfile existing

  dogfood-tests:
    runs-on: debian-trixie
    permissions: {}
    strategy:
      matrix:
        lockfile: [existing, recent, minimal, maximum]
        toolchain: [stable, msrv]
    steps:
      - uses: https://data.forgejo.org/actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6
        with:
          fetch-depth: 0 # Context required for bisectability tests.
          persist-credentials: false
      - name: Dogfood with cargo-rbmt
        uses: ./actions/setup-rbmt
        with:
          rbmt-path: cargo-rbmt
      - name: Run tests
        run: cargo rbmt test --lockfile ${{ matrix.lockfile }} --toolchain ${{ matrix.toolchain }} --baseline ${{ forgejo.event.pull_request.base.sha || forgejo.event.before }}
